<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        .grid-3-cols { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1.5rem; }
        @media (max-width: 1024px) { .grid-3-cols { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 640px) { .grid-3-cols { grid-template-columns: repeat(1, minmax(0, 1fr)); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-4xl font-black text-slate-900 italic tracking-tighter">AWS Infrastructure</h1>
                <p class="text-slate-500 font-medium">Enterprise-grade Cloud Architecture Dashboard</p>
            </div>
            <a href="index.html" class="px-6 py-3 bg-white border border-slate-200 rounded-2xl text-slate-600 font-bold hover:text-blue-600 hover:border-blue-600 transition-all shadow-sm">Home</a>
        </div>

        <div class="bg-slate-900 rounded-[2.5rem] p-10 mb-12 shadow-2xl border border-slate-800 relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-white text-xl font-bold mb-8 flex items-center gap-3">
                    <span class="flex h-3 w-3 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                    </span>
                    System Traffic Flow
                </h2>
                <div class="flex flex-wrap justify-between items-center gap-4 bg-slate-800/40 p-8 rounded-3xl border border-slate-700/50 backdrop-blur-sm">
                    <div class="flex flex-col items-center gap-2 group">
                        <div class="px-5 py-3 bg-purple-600 rounded-xl text-white font-bold text-sm shadow-lg group-hover:scale-110 transition-transform">Route 53</div>
                        <span class="text-[10px] text-slate-500 uppercase font-black">DNS</span>
                    </div>
                    <div class="text-slate-600 font-bold">▶</div>
                    <div class="flex flex-col items-center gap-2 group">
                        <div class="px-5 py-3 bg-indigo-600 rounded-xl text-white font-bold text-sm shadow-lg group-hover:scale-110 transition-transform">CloudFront</div>
                        <span class="text-[10px] text-slate-500 uppercase font-black">CDN</span>
                    </div>
                    <div class="text-slate-600 font-bold">▶</div>
                    <div class="flex flex-col items-center gap-2 group">
                        <div class="px-5 py-3 bg-pink-600 rounded-xl text-white font-bold text-sm shadow-lg group-hover:scale-110 transition-transform">WAF</div>
                        <span class="text-[10px] text-slate-500 uppercase font-black">Security</span>
                    </div>
                    <div class="text-slate-600 font-bold">▶</div>
                    <div class="flex flex-col items-center gap-2 group">
                        <div class="px-5 py-3 bg-green-600 rounded-xl text-white font-bold text-sm shadow-lg group-hover:scale-110 transition-transform">ALB</div>
                        <span class="text-[10px] text-slate-500 uppercase font-black">L7 Load Balancer</span>
                    </div>
                    <div class="text-slate-600 font-bold">▶</div>
                    <div class="flex flex-col items-center gap-2 group">
                        <div class="px-6 py-4 bg-orange-600 rounded-2xl text-white font-black text-sm shadow-xl group-hover:scale-110 transition-transform ring-4 ring-orange-600/20">ECS / EKS</div>
                        <span class="text-[10px] text-slate-500 uppercase font-black">Compute</span>
                    </div>
                    <div class="text-slate-600 font-bold">↕</div>
                    <div class="flex flex-col items-center gap-2 group">
                        <div class="px-5 py-3 bg-blue-600 rounded-xl text-white font-bold text-sm shadow-lg group-hover:scale-110 transition-transform">RDS / S3</div>
                        <span class="text-[10px] text-slate-500 uppercase font-black">Data Store</span>
                    </div>
                </div>
            </div>
            <div class="absolute top-0 right-0 -mr-16 -mt-16 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl"></div>
        </div>

        <div id="card-grid" class="grid-3-cols animate-fade-in"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/80 backdrop-blur-md flex items-center justify-center z-50 p-4" onclick="closeModal()">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-10 transform transition-all border border-slate-100" onclick="event.stopPropagation()">
            <div id="modal-tag" class="inline-block px-4 py-1 rounded-full text-[11px] font-black uppercase tracking-widest mb-4 border"></div>
            <h3 id="modal-title" class="text-4xl font-black text-slate-900 mb-6 tracking-tight"></h3>
            <div class="h-px bg-slate-100 w-full mb-8"></div>
            <p id="modal-desc" class="text-slate-600 text-lg leading-relaxed mb-10 font-medium"></p>
            <button onclick="closeModal()" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-blue-600 transition-all shadow-xl active:scale-95">확인했습니다</button>
        </div>
    </div>

    <script>
        const services = [
            { cat: 'Networking', title: 'VPC', color: 'blue', desc: 'Virtual Private Cloud를 통해 논리적으로 격리된 네트워크 환경을 구축합니다. 서브넷 설계, 라우팅 테이블, 인터넷 게이트웨이 구성을 통해 리소스간 보안 통신을 보장합니다.' },
            { cat: 'Compute', title: 'EC2', color: 'orange', desc: '확장 가능한 가상 서버 환경을 제공합니다. 사용자의 요구사항에 맞춘 인스턴스 타입 선택과 Auto Scaling을 통해 고가용성을 유지합니다.' },
            { cat: 'Compute', title: 'ECS Fargate', color: 'orange', desc: '서버 관리 없이 컨테이너를 실행하는 서버리스 엔진입니다. 클러스터 운영 부담을 줄이고 애플리케이션 개발에만 집중할 수 있게 합니다.' },
            { cat: 'Kubernetes', title: 'EKS', color: 'orange', desc: '관리형 쿠버네티스 서비스를 통해 컨테이너화된 애플리케이션을 대규모로 배포하고 관리합니다. AWS 보안 및 네트워킹 서비스와 긴밀하게 통합됩니다.' },
            { cat: 'Registry', title: 'ECR', color: 'orange', desc: '완전관리형 Docker 컨테이너 레지스트리로, 이미지를 안전하게 저장하고 배포 파이프라인(CI/CD)과 연동하여 빠른 업데이트를 지원합니다.' },
            { cat: 'Storage', title: 'Amazon S3', color: 'green', desc: '업계 최고의 확장성과 데이터 가용성을 제공하는 객체 스토리지입니다. 정적 웹 사이트 호스팅, 로그 보관, 데이터 레이크 구축에 사용됩니다.' },
            { cat: 'Database', title: 'Amazon RDS', color: 'blue', desc: '관리형 관계형 데이터베이스 서비스입니다. 자동 백업, 패치 관리, 다중 AZ 배포를 통한 고가용성을 지원하여 DB 운영 부담을 해소합니다.' },
            { cat: 'CDN', title: 'CloudFront', color: 'indigo', desc: '전 세계 Edge 로케이션을 통해 콘텐츠를 저지연으로 배포합니다. SSL 인증서 통합 및 AWS WAF 연동을 통해 보안 전송을 강화합니다.' },
            { cat: 'DNS', title: 'Route 53', color: 'purple', short: 'DNS', desc: '가용성이 매우 높은 클라우드 Domain Name System입니다. 헬스 체크 기능을 통해 장애 발생 시 트래픽을 즉시 백업 리소스로 우회시킵니다.' },
            { cat: 'Security', title: 'AWS WAF', color: 'pink', desc: '웹 애플리케이션 방화벽으로 SQL Injection, Cross-site Scripting 등 일반적인 웹 공격으로부터 인프라를 보호하고 트래픽 필터링을 수행합니다.' },
            { cat: 'Monitoring', title: 'CloudWatch', color: 'red', desc: 'AWS 리소스 및 애플리케이션의 실시간 모니터링을 지원합니다. 로그 수집, 지표 분석 및 이상 감지 시 즉각적인 알람을 발송합니다.' },
            { cat: 'Serverless', title: 'AWS Lambda', color: 'yellow', desc: '이벤트에 반응하여 코드를 실행하는 서버리스 컴퓨팅 서비스입니다. 실행 시간에 대해서만 비용을 지불하여 비용 효율적인 백엔드 구축이 가능합니다.' },
            { cat: 'Gateway', title: 'API Gateway', color: 'purple', desc: '어떠한 규모에서도 API를 생성, 게시, 유지 관리 및 보안할 수 있도록 지원하는 관리형 서비스입니다. Lambda와 연동하여 서버리스 API를 구축합니다.' },
            { cat: 'Messaging', title: 'Amazon SQS', color: 'orange', desc: '완전관리형 메시지 대기열 서비스입니다. 마이크로서비스 간의 결합도를 낮추고 분산 시스템의 확장성과 신뢰성을 높여줍니다.' },
            { cat: 'Security', title: 'IAM', color: 'red', desc: 'AWS 리소스에 대한 액세스를 안전하게 제어합니다. 사용자, 그룹, 역할을 생성하여 최소 권한 원칙(Least Privilege)에 따른 보안을 실현합니다.' },
            { cat: 'Automation', title: 'CodePipeline', color: 'blue', desc: '빠르고 안정적인 애플리케이션 업데이트를 위해 배포 단계를 자동화합니다. 소스 코드 변경부터 빌드, 테스트, 배포까지 전 과정을 관리합니다.' }
        ];

        const colorMap = {
            blue: 'text-blue-600 bg-blue-50 border-blue-100',
            orange: 'text-orange-600 bg-orange-50 border-orange-100',
            green: 'text-green-600 bg-green-50 border-green-100',
            indigo: 'text-indigo-600 bg-indigo-50 border-indigo-100',
            purple: 'text-purple-600 bg-purple-50 border-purple-100',
            pink: 'text-pink-600 bg-pink-50 border-pink-100',
            red: 'text-red-600 bg-red-50 border-red-100',
            yellow: 'text-yellow-700 bg-yellow-50 border-yellow-100'
        };

        const grid = document.getElementById('card-grid');
        services.forEach(s => {
            const card = document.createElement('div');
            card.className = "bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 cursor-pointer flex flex-col justify-between group";
            card.onclick = () => openModal(s);
            card.innerHTML = `
                <div>
                    <span class="inline-block px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter mb-4 border ${colorMap[s.color]}">${s.cat}</span>
                    <h2 class="text-2xl font-black text-slate-800 mb-2 group-hover:text-blue-600 transition-colors">${s.title}</h2>
                    <p class="text-slate-400 text-xs line-clamp-2 leading-relaxed">상세 기술 스택 및 인프라 구성 정보 확인</p>
                </div>
                <div class="mt-8 flex items-center text-blue-600 font-bold text-sm">
                    자세히 보기 
                    <svg class="w-4 h-4 ml-2 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </div>
            `;
            grid.appendChild(card);
        });

        function openModal(s) {
            const modal = document.getElementById('modal');
            const tag = document.getElementById('modal-tag');
            document.getElementById('modal-title').innerText = s.title;
            document.getElementById('modal-desc').innerText = s.desc;
            tag.innerText = s.cat;
            tag.className = `inline-block px-4 py-1 rounded-full text-[11px] font-black uppercase tracking-widest mb-4 border ${colorMap[s.color]}`;
            modal.classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
