<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Resources Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; min-height: 100vh; padding: 40px 24px; }
.container { max-width: 1280px; margin: 0 auto; }
.header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; gap: 16px; flex-wrap: wrap; }
.eyebrow { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #94a3b8; font-weight: 700; margin-bottom: 4px; font-family: monospace; }
h1 { font-size: 36px; font-weight: 900; color: #0f172a; letter-spacing: -.02em; line-height: 1.1; }
h1 span { color: #2563eb; font-style: italic; }
.sub { font-size: 13px; color: #64748b; margin-top: 6px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.stat-box { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 12px 20px; text-align: center; min-width: 64px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.stat-num { font-size: 24px; font-weight: 900; color: #0f172a; font-family: monospace; }
.stat-lbl { font-size: 10px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
.back-btn { padding: 12px 20px; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; color: #94a3b8; font-weight: 700; text-decoration: none; font-size: 13px; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: color .2s; }
.back-btn:hover { color: #2563eb; }
.filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.filter-btn { padding: 8px 16px; border-radius: 12px; border: 1px solid; font-weight: 700; font-size: 11px; cursor: pointer; transition: all .18s; }
.filter-btn.all        { border-color:#e2e8f0; color:#475569; background:#fff; }
.filter-btn.Compute    { border-color:#bfdbfe; color:#2563eb; background:#eff6ff; }
.filter-btn.Networking { border-color:#bbf7d0; color:#16a34a; background:#f0fdf4; }
.filter-btn.Storage    { border-color:#fed7aa; color:#ea580c; background:#fff7ed; }
.filter-btn.Database   { border-color:#e9d5ff; color:#9333ea; background:#fdf4ff; }
.filter-btn.Security   { border-color:#fecaca; color:#dc2626; background:#fef2f2; }
.filter-btn.DevOps     { border-color:#bae6fd; color:#0284c7; background:#f0f9ff; }
.filter-btn.Registry   { border-color:#cbd5e1; color:#475569; background:#f8fafc; }
.filter-btn.Messaging  { border-color:#fef08a; color:#ca8a04; background:#fefce8; }
.filter-btn.active     { background:#1d4ed8!important; color:#fff!important; border-color:#1d4ed8!important; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.card { background: #fff; border: 1px solid #e2e8f0; border-radius: 24px; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; transition: transform .22s, box-shadow .22s; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.card:hover { transform: translateY(-5px); box-shadow: 0 20px 48px rgba(0,0,0,.12); }
.card-top { padding: 18px 18px 8px; }
.cat-badge { display: inline-block; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: .12em; padding: 3px 10px; border-radius: 999px; border: 1px solid; margin-bottom: 10px; }
.badge-Compute    { background:#eff6ff; color:#2563eb; border-color:#bfdbfe; }
.badge-Networking { background:#f0fdf4; color:#16a34a; border-color:#bbf7d0; }
.badge-Storage    { background:#fff7ed; color:#ea580c; border-color:#fed7aa; }
.badge-Database   { background:#fdf4ff; color:#9333ea; border-color:#e9d5ff; }
.badge-Security   { background:#fef2f2; color:#dc2626; border-color:#fecaca; }
.badge-DevOps     { background:#f0f9ff; color:#0284c7; border-color:#bae6fd; }
.badge-Registry   { background:#f8fafc; color:#475569; border-color:#cbd5e1; }
.badge-Messaging  { background:#fefce8; color:#ca8a04; border-color:#fef08a; }
.card-title { font-size: 17px; font-weight: 900; color: #0f172a; letter-spacing: -.01em; }
.card-short { font-size: 11px; color: #94a3b8; font-weight: 500; margin-top: 3px; }
.card-icon { margin: 10px 16px; background: #f8fafc; border-radius: 16px; padding: 16px; display: flex; align-items: center; justify-content: center; min-height: 80px; }
.card-icon img { width: 52px; height: 52px; object-fit: contain; }
.card-footer { padding: 8px 18px 16px; font-size: 11px; font-weight: 700; color: #2563eb; }
.empty { text-align: center; padding: 80px 0; color: #94a3b8; display: none; }
.empty p:first-child { font-size: 48px; margin-bottom: 12px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.6); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; animation: fadeIn .18s ease; }
.modal-overlay.hidden { display: none; }
.modal-box { background: #fff; border-radius: 28px; padding: 32px; width: 100%; max-width: 420px; box-shadow: 0 32px 80px rgba(0,0,0,.22); animation: slideUp .2s ease; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-close { background: none; border: none; font-size: 20px; font-weight: 900; color: #cbd5e1; cursor: pointer; }
.modal-close:hover { color: #64748b; }
.modal-icon { display: flex; justify-content: center; margin-bottom: 16px; }
.modal-icon img { width: 64px; height: 64px; }
.modal-title { font-size: 28px; font-weight: 900; color: #0f172a; letter-spacing: -.02em; margin-bottom: 2px; }
.modal-short { font-size: 13px; color: #94a3b8; margin-bottom: 14px; }
.modal-divider { height: 1px; background: #f1f5f9; margin-bottom: 14px; }
.modal-desc { font-size: 13px; color: #475569; line-height: 1.7; margin-bottom: 24px; }
.modal-btn { display: block; width: 100%; padding: 15px; background: #2563eb; color: #fff; text-align: center; font-weight: 900; font-size: 13px; border-radius: 12px; text-decoration: none; border: none; cursor: pointer; transition: background .18s; margin-bottom: 8px; }
.modal-btn:hover { background: #1d4ed8; }
.modal-cancel { display: block; width: 100%; padding: 10px; background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 700; color: #94a3b8; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <p class="eyebrow">AWS Infrastructure</p>
      <h1>리소스 정보 <span>대시보드</span></h1>
      <p class="sub">핵심 AWS 서비스 카탈로그 — 카테고리별 빠른 탐색</p>
    </div>
    <div class="header-right">
      <div class="stat-box">
        <div class="stat-num" id="visible-count">29</div>
        <div class="stat-lbl">서비스</div>
      </div>
      <a href="index.html" class="back-btn">← Back</a>
    </div>
  </div>
  <div class="filters">
    <button class="filter-btn all active"       data-cat="all">전체</button>
    <button class="filter-btn Compute"           data-cat="Compute">Compute</button>
    <button class="filter-btn Networking"        data-cat="Networking">Networking</button>
    <button class="filter-btn Storage"           data-cat="Storage">Storage</button>
    <button class="filter-btn Database"          data-cat="Database">Database</button>
    <button class="filter-btn Security"          data-cat="Security">Security</button>
    <button class="filter-btn DevOps"            data-cat="DevOps">DevOps</button>
    <button class="filter-btn Registry"          data-cat="Registry">Registry</button>
    <button class="filter-btn Messaging"         data-cat="Messaging">Messaging</button>
  </div>
  <div class="grid" id="cards-grid"></div>
  <div class="empty" id="empty-state"><p>🔍</p><p>해당 카테고리의 서비스가 없습니다.</p></div>
</div>

<div id="modal" class="modal-overlay hidden" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span id="m-tag" class="cat-badge"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-icon"><img id="m-icon" src="" alt=""></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-short" id="m-short"></div>
    <div class="modal-divider"></div>
    <div class="modal-desc"  id="m-desc"></div>
    <a id="m-link" href="#" target="_blank" class="modal-btn">AWS 콘솔에서 열기 →</a>
    <button class="modal-cancel" onclick="closeModal()">닫기</button>
  </div>
</div>

function renderCards(list) {
  const grid = document.getElementById("cards-grid");
  grid.innerHTML = "";
  list.forEach(s => {
    const key = iconKey[s.title] || "EC2";
    const iconSrc = ICONS[key] || "";
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="card-top">
        <span class="cat-badge badge-${s.cat}">${s.cat}</span>
        <div class="card-title">${s.title}</div>
        <div class="card-short">${s.short}</div>
      </div>
      <div class="card-icon"><img src="${iconSrc}" alt="${s.title}"></div>
      <div class="card-footer">자세히 보기 →</div>`;
    div.addEventListener("click", () => openModal(s, iconSrc));
    grid.appendChild(div);
  });
  document.getElementById("visible-count").innerText = list.length;
  document.getElementById("empty-state").style.display = list.length ? "none" : "block";
}

renderCards(services);

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const cat = btn.dataset.cat;
    renderCards(cat === "all" ? services : services.filter(s => s.cat === cat));
  });
});

function openModal(s, iconSrc) {
  document.getElementById("m-title").innerText = s.title;
  document.getElementById("m-desc").innerText = s.desc;
  document.getElementById("m-short").innerText = s.short;
  document.getElementById("m-link").href = s.link;
  document.getElementById("m-icon").src = iconSrc;
  document.getElementById("m-icon").alt = s.title;
  const tag = document.getElementById("m-tag");
  tag.innerText = s.cat;
  tag.className = `cat-badge badge-${s.cat}`;
  document.getElementById("modal").classList.remove("hidden");
  document.body.style.overflow = "hidden";
}
function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  document.body.style.overflow = "";
}
document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
</script>
