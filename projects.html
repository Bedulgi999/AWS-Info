<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AWS Projects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-4xl font-black text-slate-900 mb-10 italic">The projects page</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            {% for s in services %}
            <div onclick="openModal('{{ s.title }}', '{{ s.desc }}', '{{ s.link }}', '{{ s.cat }}')" 
                 class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-[10px] font-black uppercase tracking-widest text-blue-600 bg-blue-50 px-2 py-1 rounded">{{ s.cat }}</span>
                    <div class="w-8 h-8 bg-slate-50 rounded-lg flex items-center justify-center text-slate-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                    </div>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">{{ s.title }}</h2>
                <p class="text-slate-400 text-xs">{{ s.short }}</p>
                <div class="mt-6 text-blue-600 font-bold text-sm">자세히 보기 →</div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-2xl" onclick="event.stopPropagation()">
            <span id="m-tag" class="text-[10px] font-black text-blue-600 border border-blue-100 px-3 py-1 rounded-full mb-4 inline-block"></span>
            <h3 id="m-title" class="text-3xl font-black text-slate-900 mb-6"></h3>
            <p id="m-desc" class="text-slate-600 mb-10 leading-relaxed"></p>
            <div class="flex flex-col gap-3">
                <a id="m-link" href="#" target="_blank" class="w-full py-4 bg-blue-600 text-white text-center font-bold rounded-2xl hover:bg-blue-700 transition">AWS 콘솔로 이동</a>
                <button onclick="closeModal()" class="w-full py-3
