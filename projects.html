<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f1f5f9; }
        .grid-3-cols { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1.5rem; }
        @media (max-width: 1024px) { .grid-3-cols { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        @media (max-width: 640px) { .grid-3-cols { grid-template-columns: repeat(1, minmax(0, 1fr)); } }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-slate-200 pb-6">
            <h1 class="text-4xl font-black text-slate-900 italic">Project Dashboard</h1>
            <a href="index.html" class="px-5 py-2 bg-white border border-slate-200 rounded-xl text-slate-400 font-bold hover:text-blue-600 transition shadow-sm">Home</a>
        </div>

        <div class="bg-slate-900 rounded-3xl p-8 mb-10 shadow-2xl border border-slate-800">
            <h2 class="text-white text-xl font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> Infrastructure Architecture
            </h2>
            <div class="bg-slate-800/50 rounded-2xl p-8 border border-slate-700">
                <div class="flex flex-wrap justify-center items-center gap-4 text-white font-bold text-xs md:text-sm">
                    <div class="px-4 py-2 bg-purple-600 rounded-lg shadow-lg">Route 53</div>
                    <span class="text-slate-500">→</span>
                    <div class="px-4 py-2 bg-indigo-600 rounded-lg shadow-lg">CloudFront</div>
                    <span class="text-slate-500">→</span>
                    <div class="px-4 py-2 bg-green-600 rounded-lg shadow-lg">ALB</div>
                    <span class="text-slate-500">→</span>
                    <div class="px-4 py-2 bg-orange-600 rounded-lg shadow-lg">ECS/EKS</div>
                    <span class="text-slate-500">↕</span>
                    <div class="px-4 py-2 bg-blue-600 rounded-lg shadow-lg">S3 / RDS</div>
                </div>
                <p class="mt-6 text-slate-400 text-sm text-center font-medium leading-relaxed">
                    이 아키텍처는 <b>Multi-AZ</b> 가용 영역에 배포되어 장애 내구성을 갖추고 있으며,<br>
                    Public Subnet에는 ALB/NAT를, Private Subnet에는 애플리케이션 리소스를 배치하여 보안을 극대화했습니다.
                </p>
            </div>
        </div>

        <div id="card-grid" class="grid-3-cols"></div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/70 backdrop-blur-md flex items-center justify-center z-50 p-4" onclick="closeModal()">
        <div class="bg-white w-full max-w-xl rounded-3xl shadow-2xl p-10 transform transition-all" onclick="event.stopPropagation()">
            <h3 id="modal-title" class="text-4xl font-black text-slate-900 mb-6"></h3>
            <p id="modal-desc" class="text-slate-600 text-lg leading-relaxed mb-10 font-medium"></p>
            <button onclick="closeModal()" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl hover:bg-blue-700 transition shadow-lg">확인</button>
        </div>
    </div>

    <script>
        const services = [
            { cat: 'Networking', title: 'VPC', desc: 'Virtual Private Cloud를 통해 논리적으로 격리된 네트워크 환경을 구축하고, 서브넷 설계를 통해 인프라 기초 보안을 강화했습니다.' },
            { cat: 'Compute', title: 'EC2', desc: 'Auto Scaling Group과 결합하여 트래픽 부하에 따라 유연하게 대응하는 가상 서버 환경을 운영합니다.' },
            { cat: 'Compute', title: 'ECS Fargate', desc: '서버 관리의 번거로움 없이 Docker 컨테이너를 실행하며 고가용성을 유지하는 서버리스 컴퓨팅 환경입니다.' },
            { cat: 'Registry', title: 'ECR', desc: '컨테이너 이미지를 안전하게 관리하고 버전별로 저장하여 CI/CD 파이프라인의 핵심 저장소 역할을 수행합니다.' },
            { cat: 'Storage', title: 'Amazon S3', desc: '업계 표준 객체 스토리지로 정적 웹 호스팅 및 로그 데이터 저장소로 활용하며 높은 내구성을 보장합니다.' },
            { cat: 'Monitoring', title: 'CloudWatch', desc: '지표 기반 알람 설정을 통해 리소스 이상 징후를 실시간 탐지하고 대시보드로 시각화합니다.' }
        ];

        const grid = document.getElementById('card-grid');
        services.forEach(s => {
            const card = document.createElement('div');
            card.className = "bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300 cursor-pointer flex flex-col justify-between";
            card.onclick = () => openModal(s);
            card.innerHTML = `
                <div>
                    <span class="text-xs font-black text-blue-600 uppercase tracking-widest mb-4 block">${s.cat}</span>
                    <h2 class="text-2xl font-black text-slate-800 mb-2">${s.title}</h2>
                </div>
                <div class="mt-8 text-blue-600 font-bold text-sm">기술 상세 보기 →</div>
            `;
            grid.appendChild(card);
        });

        function openModal(s) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = s.title;
            document.getElementById('modal-desc').innerText = s.desc;
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
